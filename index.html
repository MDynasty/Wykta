<!DOCTYPE html>
<html>

<head>
<title>Wykta</title>
<meta charset="UTF-8">
</head>

<body>

<h1>Wykta Ingredient Analyzer</h1>

<p>Paste a product ingredient list to understand what each ingredient means.</p>

<textarea
id="ingredients"
rows="6"
cols="60"
placeholder="Example: Water, Glycerin, Niacinamide, Phenoxyethanol">
</textarea>

<br><br>

<button onclick="analyzeIngredients()">
Analyze Ingredients
</button>

<hr>

<h2>AI Ingredient Analysis</h2>

<div id="ingredientResult">
AI results will appear here
</div>

<hr>

<h2>Interaction Warnings</h2>

<div id="interactionWarnings">
Ingredient conflicts will appear here
</div>

<hr>

<h2>Scan Ingredient Label</h2>

<button onclick="startScan()">
Open Camera
</button>

<br><br>

<video id="camera" width="300" autoplay></video>

<br><br>

<button onclick="capture()">
Capture
</button>

<canvas id="snapshot" style="display:none;"></canvas>

<hr>

<h2>Detected Text</h2>

<div id="ocrResult"></div>

<!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- OCR library -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<!-- Your application logic -->
<script src="app.js"></script>

</body>
</html>
