<!DOCTYPE html>
<html>

<head>
<title>Wykta – Ingredient Analyzer</title>
<meta charset="UTF-8">

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto;
background:#f3f4f6;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.app{
width:650px;
background:white;
border-radius:14px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
font-size:28px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:1px solid #ddd;
padding:12px;
font-size:14px;
}

button{
background:#4f46e5;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:500;
}

button:hover{
background:#4338ca;
}

.section{
margin-top:25px;
}

.result-card{
background:#f9fafb;
border-radius:10px;
padding:12px;
margin-top:8px;
}

.warning{
background:#fff3cd;
padding:12px;
border-radius:10px;
margin-top:8px;
}

video{
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="app">

<h1>Wykta Ingredient Analyzer</h1>

<p>Paste a product ingredient list to understand what each ingredient means.</p>

<div class="section">

<label for="language">Language</label>
<select id="language">
  <option value="en">English</option>
  <option value="fr">Français</option>
  <option value="de">Deutsch</option>
  <option value="zh">中文</option>
</select>

</div>

<label for="ingredients">Ingredients</label>
<textarea
  id="ingredients"
  rows="6"
  cols="60"
  placeholder="Example: Water, Glycerin, Niacinamide, Phenoxyethanol">
</textarea>
<br><br>

<button onclick="analyzeIngredients()">
Analyze Ingredients
</button>

<hr>

<h2>AI Ingredient Analysis</h2>

<div id="ingredientResult">
Local ingredient definitions will appear here
</div>

<div id="aiAnalysis"></div>

<hr>

<h2>Interaction Warnings</h2>

<div id="interactionWarnings">
Ingredient conflicts will appear here
</div>

<hr>

<h2>Scan Ingredient Label</h2>

<button onclick="startScan()">
Open Camera
</button>

<br><br>

<video id="camera" width="300" autoplay></video>

<br><br>

<button onclick="capture()">
Capture
</button>

<canvas id="snapshot" style="display:none;"></canvas>

<hr>

<h2>Detected Text</h2>

<div id="ocrResult"></div>

<!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- App config (ignored in GitHub repo) -->
<script src="config.js"></script>

<!-- OCR library -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<!-- Your application logic -->
<script src="app.js"></script>

</body>
</html>
