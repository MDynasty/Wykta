<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Sales - Wykta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><div class="brand-mark">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs><linearGradient id="leafGrad" x1="3" y1="2" x2="19" y2="20" gradientUnits="userSpaceOnUse"><stop stop-color="#2d8c52"/><stop offset="1" stop-color="#40b870"/></linearGradient></defs>
    <path d="M11 2.5C11 2.5 4 7.5 4 13C4 16.3 7.1 18.5 11 18.5C14.9 18.5 18 16.3 18 13C18 7.5 11 2.5 11 2.5Z" stroke="url(#leafGrad)" stroke-width="1.55" stroke-linecap="round" fill="rgba(45,140,82,0.10)"/>
    <path d="M11 4.5V17" stroke="url(#leafGrad)" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <path d="M7.5 13L10 15.5L15 10.5" stroke="url(#leafGrad)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div><span>Wykta</span></a>
      <div class="nav-right">
        <a class="nav-link" href="checkout.html">Checkout</a>
        <a class="nav-link" href="community.html">Community</a>
      </div>
    </div>
  </nav>

  <main class="sub-main">
    <section class="sub-hero">
      <h1 id="salesTitle">Contact sales</h1>
      <p id="salesSubtitle">Tell us your team size and goals. We will respond within 1 business day with a custom quote and onboarding plan.</p>
    </section>

    <section class="sub-grid">
      <article class="card">
        <h2 class="card-title" id="formTitle">Enterprise request</h2>
        <p id="directContact" style="font-size:13px; color:var(--text-2); margin-bottom:16px;">
          Or email directly: <a href="mailto:sales@wykta.app" style="color:var(--brand, #2d8c52); font-weight:600;">sales@wykta.app</a>
        </p>
        <form id="salesForm">
          <div class="field">
            <label class="field-label" for="company" id="labelCompany">Company</label>
            <input id="company" type="text" required>
          </div>
          <div class="field">
            <label class="field-label" for="workEmail" id="labelEmail">Work email</label>
            <input id="workEmail" type="email" required>
          </div>
          <div class="field">
            <label class="field-label" for="teamSize" id="labelTeamSize">Team size</label>
            <select id="teamSize" required>
              <option value="1-10">1–10</option>
              <option value="11-50">11–50</option>
              <option value="51-200">51–200</option>
              <option value="200+">200+</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label" for="needs" id="labelNeeds">Primary needs</label>
            <textarea id="needs" placeholder="API integrations, white-label scope, team workflow, compliance requirements..."></textarea>
          </div>
          <div class="status-box" id="salesStatus"></div>
          <button class="btn btn-primary" type="submit" id="submitBtn">
            <span id="submitLabel">Send request</span>
            <span class="spinner" id="submitSpinner" style="display:none;"></span>
          </button>
        </form>
      </article>

      <article class="card">
        <h2 class="card-title" id="nextTitle">What happens next</h2>
        <ul id="nextSteps" style="padding-left:20px; color:var(--text-2); display:grid; gap:8px;"></ul>
      </article>
    </section>
  </main>

  <script>
    const SUPABASE_URL = typeof supabaseUrl !== 'undefined' ? supabaseUrl : '';
    const SUPABASE_ANON = typeof supabaseKey !== 'undefined' ? supabaseKey : '';

    const params = new URLSearchParams(window.location.search);
    const rawLang = (params.get('lang') || localStorage.getItem('wykta_lang') || navigator.language || 'en').slice(0, 2).toLowerCase();
    const lang = ['en', 'fr', 'de', 'zh'].includes(rawLang) ? rawLang : 'en';
    document.documentElement.lang = lang;
    localStorage.setItem('wykta_lang', lang);

    function withLang(href) {
      if (!href || href.startsWith('#')) return href;
      if (/^(mailto:|tel:|javascript:)/i.test(href)) return href;
      try {
        const url = new URL(href, window.location.href);
        if (url.origin !== window.location.origin) return href;
        const page = url.pathname.split('/').pop() || 'index.html';
        const localPages = new Set(['index.html', 'checkout.html', 'contact-sales.html', 'community.html', 'payment-success.html']);
        if (!localPages.has(page)) return href;
        url.searchParams.set('lang', lang);
        return `${url.pathname}${url.search}${url.hash}`;
      } catch (err) {
        return href;
      }
    }

    document.querySelectorAll('a[href]').forEach((el) => {
      const href = el.getAttribute('href');
      const localizedHref = withLang(href);
      if (localizedHref && localizedHref !== href) {
        el.setAttribute('href', localizedHref);
      }
    });

    const copy = {
      en: {
        title: 'Contact sales', subtitle: 'Tell us your team size and goals. We will respond within 1 business day.',
        formTitle: 'Enterprise request', labelCompany: 'Company', labelEmail: 'Work email',
        labelTeamSize: 'Team size', labelNeeds: 'Primary needs', needsPlaceholder: 'API integrations, white-label scope, team workflow, compliance requirements...',
        submitLabel: 'Send request',
        nextTitle: 'What happens next',
        steps: [
          'Your lead is logged in our CRM queue and tagged by plan, team size, and channel.',
          'Response within 1 business day with pricing, implementation scope, and SLA.',
          'Typical customization includes API integration, white-label flows, role permissions, and compliance requirements.',
          'If approved, payment invoice via Stripe Billing or wire transfer.',
          'After payment, your team receives onboarding and community access links.',
        ],
        success: 'Request sent! We will be in touch within 1 business day.',
        error: 'Submission failed. Please try again or email us directly.',
      },
      fr: {
        title: 'Contacter l\'équipe commerciale',
        subtitle: 'Décrivez votre équipe et vos objectifs. Réponse sous 1 jour ouvré.',
        formTitle: 'Demande entreprise', labelCompany: 'Société', labelEmail: 'Email professionnel',
        labelTeamSize: 'Taille de l\'équipe', labelNeeds: 'Besoins principaux', needsPlaceholder: 'Intégrations API, périmètre marque blanche, workflow équipe, conformité...',
        submitLabel: 'Envoyer la demande',
        nextTitle: 'Prochaines étapes',
        steps: [
          'Votre demande est enregistrée dans notre CRM et qualifiée.',
          'Réponse sous 1 jour ouvré avec tarification et périmètre d\'implémentation.',
          'Les besoins sur mesure couvrent souvent API, marque blanche, rôles/permissions et conformité.',
          'Si validé, facture via Stripe Billing ou virement bancaire.',
          'Après paiement, liens d\'onboarding et d\'accès communauté envoyés.',
        ],
        success: 'Demande envoyée ! Nous reviendrons vers vous sous 1 jour ouvré.',
        error: 'Échec de l\'envoi. Réessayez ou contactez-nous directement.',
      },
      de: {
        title: 'Vertrieb kontaktieren',
        subtitle: 'Beschreiben Sie Ihr Team und Ihre Ziele. Antwort innerhalb 1 Werktag.',
        formTitle: 'Enterprise-Anfrage', labelCompany: 'Unternehmen', labelEmail: 'Geschäftliche E-Mail',
        labelTeamSize: 'Teamgröße', labelNeeds: 'Hauptbedürfnisse', needsPlaceholder: 'API-Integrationen, White-Label-Umfang, Team-Workflow, Compliance-Anforderungen...',
        submitLabel: 'Anfrage senden',
        nextTitle: 'Nächste Schritte',
        steps: [
          'Ihre Anfrage wird in unsere CRM-Warteschlange aufgenommen und qualifiziert.',
          'Antwort innerhalb 1 Werktags mit Preisangebot und Implementierungsumfang.',
          'Typische Anpassungen umfassen API-Integration, White-Label, Rollenrechte und Compliance-Anforderungen.',
          'Bei Freigabe: Rechnung via Stripe Billing oder Banküberweisung.',
          'Nach Zahlung: Onboarding- und Community-Zugangsdaten werden gesendet.',
        ],
        success: 'Anfrage gesendet! Wir melden uns innerhalb 1 Werktags.',
        error: 'Übermittlung fehlgeschlagen. Bitte erneut versuchen.',
      },
      zh: {
        title: '联系销售', subtitle: '告诉我们您的团队规模和需求，我们将在1个工作日内回复。',
        formTitle: '企业方案申请', labelCompany: '公司名称', labelEmail: '工作邮箱',
        labelTeamSize: '团队规模', labelNeeds: '主要需求', needsPlaceholder: 'API 对接、白标范围、团队流程、合规要求等...',
        submitLabel: '发送申请',
        nextTitle: '后续流程',
        steps: [
          '您的申请将进入我们的 CRM 队列，按套餐、规模、渠道分类跟进。',
          '1个工作日内回复定价方案、实施范围及 SLA 说明。',
          '常见定制诉求包括 API 集成、白标化、角色权限和合规要求。',
          '通过 Stripe 发票或银行转账完成付款。',
          '付款后，发送团队 onboarding 链接及社区权限。',
        ],
        success: '申请已发送！我们将在1个工作日内与您联系。',
        error: '提交失败，请重试或直接发邮件联系我们。',
      },
    };
    const c = copy[lang] || copy.en;

    document.getElementById('salesTitle').textContent = c.title;
    document.getElementById('salesSubtitle').textContent = c.subtitle;
    document.getElementById('formTitle').textContent = c.formTitle;
    document.getElementById('labelCompany').textContent = c.labelCompany;
    document.getElementById('labelEmail').textContent = c.labelEmail;
    document.getElementById('labelTeamSize').textContent = c.labelTeamSize;
    document.getElementById('labelNeeds').textContent = c.labelNeeds;
    document.getElementById('needs').setAttribute('placeholder', c.needsPlaceholder);
    document.getElementById('submitLabel').textContent = c.submitLabel;
    document.getElementById('nextTitle').textContent = c.nextTitle;
    const ul = document.getElementById('nextSteps');
    c.steps.forEach(s => ul.insertAdjacentHTML('beforeend', `<li>${s}</li>`));

    document.getElementById('salesForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const label = document.getElementById('submitLabel');
      const spinner = document.getElementById('submitSpinner');
      const status = document.getElementById('salesStatus');

      btn.disabled = true; label.style.display = 'none'; spinner.style.display = '';

      const payload = {
        company: document.getElementById('company').value.trim(),
        email: document.getElementById('workEmail').value.trim(),
        team_size: document.getElementById('teamSize').value,
        needs: document.getElementById('needs').value.trim(),
        lang,
      };

      let saved = false;

      // Persist to Supabase DB (sales_leads table) if configured
      if (SUPABASE_URL && SUPABASE_ANON) {
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/sales_leads`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON,
              'Authorization': `Bearer ${SUPABASE_ANON}`,
              'Prefer': 'return=minimal',
            },
            body: JSON.stringify(payload),
          });
          if (res.ok || res.status === 201) saved = true;
        } catch (err) {
          console.warn('Supabase sales_leads insert failed:', err);
        }
      }

      // Fallback: email handoff
      const subject = encodeURIComponent(`Wykta Enterprise – ${payload.company}`);
      const body = encodeURIComponent(
        `Company: ${payload.company}\nEmail: ${payload.email}\nTeam: ${payload.team_size}\nNeeds: ${payload.needs}`
      );
      window.location.href = `mailto:sales@wykta.app?subject=${subject}&body=${body}`;

      status.textContent = c.success;
      status.classList.add('visible');
      btn.disabled = false; label.style.display = ''; spinner.style.display = 'none';
    });
  </script>
  <script src="config.js"></script>
</body>
</html>
