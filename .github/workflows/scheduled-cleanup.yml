name: Scheduled Data Cleanup

on:
  schedule:
    # Runs every Sunday at 03:00 UTC (low-traffic window)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger cleanup-scan-events edge function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CLEANUP_SECRET:        ${{ secrets.CLEANUP_SECRET }}
          # Derives the function URL from the same project reference used in
          # deploy-edge-function.yml to avoid duplicating the hardcoded value.
          PROJECT_REF:           rryuicpnjxxzsmkotgrj
        run: |
          if [ -z "$CLEANUP_SECRET" ]; then
            echo "CLEANUP_SECRET is not set — skipping cleanup trigger."
            exit 0
          fi
          FUNCTION_URL="https://${PROJECT_REF}.supabase.co/functions/v1/cleanup-scan-events"
          HTTP_STATUS=$(curl -s -o /tmp/cleanup-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLEANUP_SECRET}" \
            -H "Content-Type: application/json" \
            "${FUNCTION_URL}")
          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/cleanup-response.json
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "Cleanup function returned non-200 status: ${HTTP_STATUS}"
            exit 1
          fi
