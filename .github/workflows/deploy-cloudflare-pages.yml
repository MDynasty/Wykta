name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'wykta' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Wrangler CLI
        run: npm install --global wrangler@4

      - name: Verify Cloudflare authentication
        id: cloudflare_auth
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler whoami

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare_auth.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if wrangler pages project list --json | node <<'NODE'
          const target = process.env.CF_PAGES_PROJECT
          let data = ""

          process.stdin.setEncoding("utf8")
          process.stdin.on("data", (chunk) => {
            data += chunk
          })
          process.stdin.on("end", () => {
            try {
              const projects = JSON.parse(data)
              if (!Array.isArray(projects)) {
                console.error('Unexpected output from "wrangler pages project list --json".')
                process.exit(2)
              }
              process.exit(projects.some((project) => project?.name === target) ? 0 : 1)
            } catch (error) {
              console.error(`Failed to parse Cloudflare project list JSON: ${error.message}`)
              process.exit(2)
            }
          })
          NODE
          then
            echo "Cloudflare Pages project '$CF_PAGES_PROJECT' exists."
          else
            status=$?
            if [ "$status" -eq 1 ]; then
              echo "Cloudflare Pages project '$CF_PAGES_PROJECT' not found. Creating it."
              wrangler pages project create "$CF_PAGES_PROJECT" --production-branch=main
            else
              echo "::error::Unable to retrieve or parse Cloudflare Pages project list."
              exit "$status"
            fi
          fi
          wrangler pages deploy . --project-name="$CF_PAGES_PROJECT" --commit-dirty=true

      - name: Skip deploy when Cloudflare auth fails
        if: steps.cloudflare_auth.outcome != 'success'
        run: echo "::warning::Cloudflare authentication failed or token is invalid; skipping Cloudflare Pages deploy."
