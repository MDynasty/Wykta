name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare auth
        id: cloudflare-auth
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: whoami

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare-auth.outcome == 'success'
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=wykta --commit-dirty=true

      - name: Skip deploy when Cloudflare auth fails
        if: steps.cloudflare-auth.outcome != 'success'
        run: |
          echo "::warning::Cloudflare authentication failed; skipping Pages deploy to avoid merge-blocking workflow failures."
          echo "::warning::Update CLOUDFLARE_API_TOKEN with Pages deploy permissions and rerun this workflow."
