name: Sync Supabase Secrets

# Run this workflow manually from the Actions tab whenever you add or rotate
# GitHub secrets (OPENAI_API_KEY, OPENAI_MODEL, etc.) so they are pushed to
# the live Supabase project without needing a full code re-deploy.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync AI secrets to Supabase
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            supabase secrets set OPENAI_API_KEY="${OPENAI_API_KEY}" --project-ref rryuicpnjxxzsmkotgrj
            echo "OPENAI_API_KEY synced."
          else
            echo "OPENAI_API_KEY is not set in GitHub Secrets — skipping."
          fi

          if [ -n "${OPENAI_MODEL}" ]; then
            supabase secrets set OPENAI_MODEL="${OPENAI_MODEL}" --project-ref rryuicpnjxxzsmkotgrj
            echo "OPENAI_MODEL synced."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
