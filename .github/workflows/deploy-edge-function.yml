name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PROJECT_REF: rryuicpnjxxzsmkotgrj
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync secrets to Supabase runtime
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:          ${{ secrets.OPENAI_MODEL }}
          STRIPE_SECRET_KEY:     ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SITE_URL:              ${{ secrets.SITE_URL }}
        run: |
          set_secret() {
            local name="$1"; local value="$2"
            if [ -n "$value" ]; then
              supabase secrets set "${name}=${value}" --project-ref "${PROJECT_REF}"
              echo "Set secret: ${name}"
            else
              echo "Skipping ${name} (not configured)"
            fi
          }
          set_secret OPENAI_API_KEY        "${OPENAI_API_KEY}"
          set_secret OPENAI_MODEL          "${OPENAI_MODEL}"
          set_secret STRIPE_SECRET_KEY     "${STRIPE_SECRET_KEY}"
          set_secret STRIPE_WEBHOOK_SECRET "${STRIPE_WEBHOOK_SECRET}"
          set_secret SITE_URL              "${SITE_URL}"

      - name: Deploy wykta-backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy wykta-backend \
            --project-ref "${PROJECT_REF}" \
            --no-verify-jwt

      - name: Deploy create-checkout
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy create-checkout \
            --project-ref "${PROJECT_REF}" \
            --no-verify-jwt

      - name: Deploy stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy stripe-webhook \
            --project-ref "${PROJECT_REF}" \
            --no-verify-jwt

      - name: Deploy verify-session
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy verify-session \
            --project-ref "${PROJECT_REF}" \
            --no-verify-jwt

      - name: Deploy customer-portal
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy customer-portal \
            --project-ref "${PROJECT_REF}" \
            --no-verify-jwt
