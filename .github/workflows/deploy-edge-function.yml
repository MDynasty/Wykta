name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync AI secrets to Supabase
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            supabase secrets set OPENAI_API_KEY="${OPENAI_API_KEY}" --project-ref rryuicpnjxxzsmkotgrj
          else
            echo "OPENAI_API_KEY is not set in GitHub Actions secrets; Edge Function runtime will skip OpenAI calls and use its local ingredient database fallback."
          fi

          if [ -n "${OPENAI_MODEL}" ]; then
            supabase secrets set OPENAI_MODEL="${OPENAI_MODEL}" --project-ref rryuicpnjxxzsmkotgrj
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Deploy wykta-backend Edge Function
        run: |
          supabase functions deploy wykta-backend \
            --project-ref rryuicpnjxxzsmkotgrj \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
